<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <header>
    <a href="../index.html">
      <img class="rogo" src="../img/rogo.png" alt="ロゴ">
      <img class="rogo2" src="../img/rogo2.jpg" alt="ロゴ">
    </a>
    </header>

    <h1>診断結果</h1>

    <h2 id="result"></h2>

    <div class="block">
    <a href="../index.html">
      <input class="styled2" type="button" value="トップページに戻る">
    </a>    

    </div>

    <script>

    let score = Number(localStorage.getItem("score"));

    let resultText="";

    if(score <= 28){
    resultText = '<img src="../img/tyou.png" class="result2">';
    }
    else if(score <= 36){
    resultText = '<img src="../img/sintyo.png" class="result2">';
    }
    else if(score <= 44){
    resultText = '<img src="../img/baransu.png" class="result2">';
    }
    else if(score <= 52){
    resultText = '<img src="../img/sekyoku.png" class="result2">';
    }
    else{
    resultText = '<img src="../img/jonetu.png" class="result2">';
    }

  document.getElementById("result").innerHTML = resultText;
    </script>
  </body>
</html>
