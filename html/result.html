<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <header>
    <a href="../index.html">
      <img class="rogo" src="../img/rogo.png" alt="ロゴ">
      <img class="rogo2" src="../img/rogo2.jpg" alt="ロゴ">
    </a>
    </header>

    <div class="block">
      <button id="showResult" class="styled2">
      結果を見る
      </button>
    </div>

    <div id="resultArea" style="display:none;">

    <div class="block">
      <img src="../img/result.jpg" width="300px">
    </div>

    <h2 id="result"></h2><br>

    <h2 id="aishoText"></h2>

    <div class="block">
      <img id="aishoImg" src="" class="result2">
    </div>

    <div class="statusBox">
      <h3>恋愛ステータス</h3>

      <div class="status">
      <span>積極性</span>
      <div class="bar"><div id="activeBar"></div></div>
      </div>

      <div class="status">
      <span>思いやり</span>
      <div class="bar"><div id="careBar"></div></div>
      </div>

      <div class="status">
      <span>安定</span>
      <div class="bar"><div id="stableBar"></div></div>
      </div>

      <div class="status">
      <span>依存</span>
      <div class="bar"><div id="dependBar"></div></div>
    </div>

    </div>

    <div class="block">
    <a href="../index.html">
      <input class="styled2" type="button" value="トップページに戻る">
    </a>    

    </div>

  </div>


    <img id="scaryImg" src="../img/scary.png" class="scary">
    <audio id="scarySound" src="../music/scary.wav"></audio>

    <script>

    document.getElementById("showResult").addEventListener("click", function(){

    document.getElementById("resultArea").style.display = "block";

    showResult();

    });

    function showResult(){

    let active = Number(localStorage.getItem("active"));
    let care = Number(localStorage.getItem("care"));
    let stable = Number(localStorage.getItem("stable"));
    let depend = Number(localStorage.getItem("depend"));

    let resultText="";
    let resultDesc="";

    let max = Math.max(active, care, stable, depend);

    if(max === active){

    resultText = '<img src="../img/sekyoku.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>積極タイプ</h3>

    <h3>特徴</h3>
    <p>恋愛では自分から行動できるタイプ。チャンスを逃しにくい性格です。</p>

    <h3>気を付けること</h3>
    <p>勢いが強すぎると相手のペースを乱してしまうことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>相手の気持ちも尊重するとさらに魅力的になります。</p>
    </div>`;
    }

    else if(max === care){

    resultText = '<img src="../img/omoiyari.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>思いやりタイプ</h3>

    <h3>特徴</h3>
    <p>相手の気持ちを大切にできる優しい恋愛タイプ。</p>

    <h3>気を付けること</h3>
    <p>相手に合わせすぎて自分が疲れてしまうことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>自分の気持ちも大切にすることで関係が長続きします。</p>
    </div>`;
    }

    else if(max === stable){

    resultText = '<img src="../img/antei.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>安定タイプ</h3>

    <h3>特徴</h3>
    <p>落ち着いた恋愛を好む安心感のあるタイプ。</p>

    <h3>気を付けること</h3>
    <p>慎重すぎるとチャンスを逃すことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>少し勇気を出すことで恋愛が大きく進みます。</p>
    </div>`;
    }

    else{

    resultText = '<img src="../img/sintyo.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>慎重タイプ</h3>

    <h3>特徴</h3>
    <p>相手をよく観察してから行動する慎重な恋愛タイプ。</p>

    <h3>気を付けること</h3>
    <p>考えすぎて行動できなくなることがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>小さな行動から始めると恋愛が進みやすくなります。</p>
    </div>`;
    }

    document.getElementById("result").innerHTML = resultText + resultDesc;

    let aisho = Number(localStorage.getItem("aisho"));

    document.getElementById("aishoText").innerText =
    "たかしとの相性 " + aisho + "%";

    let img = "";

    if(aisho >= 80){
    img = "../img/aisho_best.png";
    }
    else if(aisho >= 60){
    img = "../img/aisho_good.png";
    }
    else if(aisho >= 40){
    img = "../img/aisho_normal.png";
    }
    else{
    img = "../img/aisho_bad.png";
    }

    document.getElementById("aishoImg").src = img;

    document.getElementById("activeBar").style.width = active * 10 + "%";
    document.getElementById("careBar").style.width = care * 10 + "%";
    document.getElementById("stableBar").style.width = stable * 10 + "%";
    document.getElementById("dependBar").style.width = depend * 10 + "%";

    const scaryImg = document.getElementById("scaryImg");
    const scarySound = document.getElementById("scarySound");

    setTimeout(() => {

    scaryImg.style.display = "block";
    scarySound.play();

    setTimeout(() => {

    scaryImg.style.display = "none";

    scarySound.pause();
    scarySound.currentTime = 0;

    },3000);

    },3000);
    }
    </script>
  </body>
</html>
