<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <header>
    <a href="../index.html">
      <img class="rogo" src="../img/rogo.png" alt="ロゴ">
      <img class="rogo2" src="../img/rogo2.jpg" alt="ロゴ">
    </a>
    </header>

    <div class="block">
      <img src="../img/kekka.jpg" width="300px">
    </div>

    <h2 id="result"></h2>

    <div class="block">
    <a href="../index.html">
      <input class="styled2" type="button" value="トップページに戻る">
    </a>    

    </div>

    <script>

    let active = Number(localStorage.getItem("active"));
    let care = Number(localStorage.getItem("care"));
    let stable = Number(localStorage.getItem("stable"));
    let depend = Number(localStorage.getItem("depend"));

    let resultText="";
    let resultDesc="";

    let max = Math.max(active, care, stable, depend);

    if(max === active){

    resultText = '<img src="../img/sekyoku.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>積極タイプ</h3>

    <h3>特徴</h3>
    <p>恋愛では自分から行動できるタイプ。チャンスを逃しにくい性格です。</p>

    <h3>気を付けること</h3>
    <p>勢いが強すぎると相手のペースを乱してしまうことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>相手の気持ちも尊重するとさらに魅力的になります。</p>
    </div>`;
    }

    else if(max === care){

    resultText = '<img src="../img/baransu.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>思いやりタイプ</h3>

    <h3>特徴</h3>
    <p>相手の気持ちを大切にできる優しい恋愛タイプ。</p>

    <h3>気を付けること</h3>
    <p>相手に合わせすぎて自分が疲れてしまうことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>自分の気持ちも大切にすることで関係が長続きします。</p>
    </div>`;
    }

    else if(max === stable){

    resultText = '<img src="../img/sintyo.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>安定タイプ</h3>

    <h3>特徴</h3>
    <p>落ち着いた恋愛を好む安心感のあるタイプ。</p>

    <h3>気を付けること</h3>
    <p>慎重すぎるとチャンスを逃すことがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>少し勇気を出すことで恋愛が大きく進みます。</p>
    </div>`;
    }

    else{

    resultText = '<img src="../img/tyou.png" class="result2">';

    resultDesc = `
    <div class="resultBox">
    <h3>慎重タイプ</h3>

    <h3>特徴</h3>
    <p>相手をよく観察してから行動する慎重な恋愛タイプ。</p>

    <h3>気を付けること</h3>
    <p>考えすぎて行動できなくなることがあります。</p>

    <h3>恋愛アドバイス</h3>
    <p>小さな行動から始めると恋愛が進みやすくなります。</p>
    </div>`;
    }

    document.getElementById("result").innerHTML = resultText + resultDesc;
    </script>
  </body>
</html>
