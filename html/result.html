<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/style.css">
  </head>
  <body>
    <h1>診断結果</h1>

    <h2 id="result"></h2>

    <div class="block">
    <a href="../index.html">
      <input class="styled2" type="button" value="トップページに戻る">
    </a>    

    </div>

    <script>

    let score = Number(localStorage.getItem("score"));

    let resultText="";

    if(score <= 28){
    resultText = "あなたは【超慎重恋愛タイプ】です。恋愛はゆっくり進める派。";
    }
    else if(score <= 36){
    resultText = "あなたは【慎重恋愛タイプ】です。";
    }
    else if(score <= 44){
    resultText = "あなたは【バランス恋愛タイプ】です。";
    }
    else if(score <= 52){
    resultText = "あなたは【積極恋愛タイプ】です。";
    }
    else{
    resultText = "あなたは【情熱恋愛タイプ】です。";
    }

    document.getElementById("result").textContent =
    "あなたの点数："+score+"点\n"+resultText;
    </script>
  </body>
</html>
