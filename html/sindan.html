<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>たかし恋愛診断</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="hearts"></div>

<header>
<a href="../index.html">
<img class="rogo" src="../img/rogo.png" alt="ロゴ">
<img class="rogo2" src="../img/rogo2.jpg" alt="ロゴ">
</a>
</header>

<form id="loveForm">

<p>① 好きな人ができたとき、あなたは？<br>

<label><input type="radio" name="q1" value="3" required> 相手から来るのを待つ</label>
<label><input type="radio" name="q1" value="2"> 様子を見ながら距離を縮める</label>
<label><input type="radio" name="q1" value="1"> すぐにアプローチする</label>

</p>


<p>② 恋人が落ち込んでいたら？<br>

<label><input type="radio" name="q2" value="3" required> そっと寄り添う</label>
<label><input type="radio" name="q2" value="2"> 相手が話してくるまで待つ</label>
<label><input type="radio" name="q2" value="1"> すぐに話を聞いて励ます</label>

</p>


<p>③ デートに誘うのは？<br>

<label><input type="radio" name="q3" value="3" required> 相手に任せる</label>
<label><input type="radio" name="q3" value="2"> タイミングが合えば誘う</label>
<label><input type="radio" name="q3" value="1"> 自分から誘う</label>

</p>


<p>④ 恋愛で一番大切だと思うものは？<br>

<label><input type="radio" name="q4" value="3" required> 安心していられる関係</label>
<label><input type="radio" name="q4" value="2"> お互いの信頼</label>
<label><input type="radio" name="q4" value="1"> 楽しさやドキドキ</label>

</p>


<p>⑤ 好きな人が他の異性と話していたら？<br>

<label><input type="radio" name="q5" value="3" required> かなり気になる</label>
<label><input type="radio" name="q5" value="2"> 少し気になる</label>
<label><input type="radio" name="q5" value="1"> あまり気にしない</label>

</p>


<p>⑥ 告白するなら？<br>

<label><input type="radio" name="q6" value="3" required> 雰囲気を見て決める</label>
<label><input type="radio" name="q6" value="2"> 自分からする</label>
<label><input type="radio" name="q6" value="1"> 相手からしてほしい</label>

</p>


<p>⑦ 恋人とはどのくらい会いたい？<br>

<label><input type="radio" name="q7" value="3" required> 週1〜2回</label>
<label><input type="radio" name="q7" value="2"> できるだけ毎日</label>
<label><input type="radio" name="q7" value="1"> 月に数回</label>

</p>


<p>⑧ 恋愛で不安になることは？<br>

<label><input type="radio" name="q8" value="3" required> よくある</label>
<label><input type="radio" name="q8" value="2"> 時々ある</label>
<label><input type="radio" name="q8" value="1"> ほとんどない</label>

</p>


<p>⑨ 恋人に対してあなたは？<br>

<label><input type="radio" name="q9" value="3" required> 甘えたい</label>
<label><input type="radio" name="q9" value="2"> お互い支え合いたい</label>
<label><input type="radio" name="q9" value="1"> 相手をリードしたい</label>

</p>


<p>⑩ 理想の恋愛は？<br>

<label><input type="radio" name="q10" value="3" required> 穏やかな恋愛</label>
<label><input type="radio" name="q10" value="2"> お互い成長できる恋愛</label>
<label><input type="radio" name="q10" value="1"> 刺激的な恋愛</label>

</p>


<p>⑪ 恋人と喧嘩したら？<br>

<label><input type="radio" name="q11" value="3" required> すぐ仲直りしたい</label>
<label><input type="radio" name="q11" value="2"> 少し時間を置く</label>
<label><input type="radio" name="q11" value="1"> 自然に解決するのを待つ</label>

</p>


<p>⑫ 好きな人にはどんな態度になる？<br>

<label><input type="radio" name="q12" value="3" required> 積極的に話しかける</label>
<label><input type="radio" name="q12" value="2"> あまり話せない</label>
<label><input type="radio" name="q12" value="1"> 普通に接する</label>

</p>


<p>⑬ 恋人との連絡頻度は？<br>

<label><input type="radio" name="q13" value="3" required> 毎日</label>
<label><input type="radio" name="q13" value="2"> 数日に1回</label>
<label><input type="radio" name="q13" value="1"> 必要なときだけ</label>

</p>


<p>⑭ デートの計画は？<br>

<label><input type="radio" name="q14" value="3" required> 一緒に考える</label>
<label><input type="radio" name="q14" value="2"> 相手に任せる</label>
<label><input type="radio" name="q14" value="1"> 自分で考える</label>

</p>


<p>⑮ 恋人の友達関係は？<br>

<label><input type="radio" name="q15" value="3" required> 気にしない</label>
<label><input type="radio" name="q15" value="2"> 少し気になる</label>
<label><input type="radio" name="q15" value="1"> かなり気になる</label>

</p>


<p>⑯ 恋人と将来の話は？<br>

<label><input type="radio" name="q16" value="3" required> あまりしない</label>
<label><input type="radio" name="q16" value="2"> 時々する</label>
<label><input type="radio" name="q16" value="1"> よくする</label>

</p>


<p>⑰ 恋人と意見が違ったら？<br>

<label><input type="radio" name="q17" value="3" required> 相手に合わせる</label>
<label><input type="radio" name="q17" value="2"> しばらく様子を見る</label>
<label><input type="radio" name="q17" value="1"> 話し合って解決する</label>

</p>


<p>⑱ 恋人への愛情表現は？<br>

<label><input type="radio" name="q18" value="3" required> 積極的</label>
<label><input type="radio" name="q18" value="2"> 普通</label>
<label><input type="radio" name="q18" value="1"> 控えめ</label>

</p>


<p>⑲ 恋愛の優先度は？<br>

<label><input type="radio" name="q19" value="3" required> 高い</label>
<label><input type="radio" name="q19" value="2"> 普通</label>
<label><input type="radio" name="q19" value="1"> 低い</label>

</p>


<p>⑳ 理想の恋人関係は？<br>

<label><input type="radio" name="q20" value="3" required> 穏やか</label>
<label><input type="radio" name="q20" value="2"> バランス型</label>
<label><input type="radio" name="q20" value="1"> 情熱的</label>

</p>


<div class="block">
<input class="resulutbtn" type="submit" value="">
</div>

</form>

<script src="../js/script.js"></script>

</body>
</html>
